<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinAxis - Diagnóstico Financiero</title>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f6fb;
margin:0;
padding:0;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
color:#1a2a44;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

label{
font-weight:bold;
font-size:14px;
}

input{
width:100%;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#0066ff;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#004ed6;
}

#resultado{
margin-top:20px;
background:#0b132b;
color:white;
padding:20px;
border-radius:8px;
white-space:pre-wrap;
}

.kpi{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
margin-top:20px;
}

.kpi div{
background:#eef2ff;
padding:15px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<h1>FinAxis - Diagnóstico Financiero</h1>

<div class="card">

<h3>Ingresar datos financieros</h3>

<div class="grid">

<div>
<label>Activo corriente</label>
<input id="activoCorriente" type="number">
</div>

<div>
<label>Pasivo corriente</label>
<input id="pasivoCorriente" type="number">
</div>

<div>
<label>Activo total</label>
<input id="activoTotal" type="number">
</div>

<div>
<label>Pasivo total</label>
<input id="pasivoTotal" type="number">
</div>

<div>
<label>Patrimonio</label>
<input id="patrimonio" type="number">
</div>

<div>
<label>Ventas</label>
<input id="ventas" type="number">
</div>

<div>
<label>Utilidad neta</label>
<input id="utilidad" type="number">
</div>

</div>

</div>

<div class="card">

<button onclick="generarDiagnostico()">Generar diagnóstico con IA</button>
<button onclick="limpiar()">Limpiar resultado</button>

<div id="resultado"></div>

</div>

<div class="card">

<h3>Indicadores financieros</h3>

<div class="kpi">

<div id="liquidez">Liquidez: -</div>
<div id="endeudamiento">Endeudamiento: -</div>
<div id="rentabilidad">Rentabilidad: -</div>

</div>

</div>

</div>

<script>

function calcularIndicadores(){

let ac=parseFloat(document.getElementById("activoCorriente").value)||0;
let pc=parseFloat(document.getElementById("pasivoCorriente").value)||0;
let at=parseFloat(document.getElementById("activoTotal").value)||0;
let pt=parseFloat(document.getElementById("pasivoTotal").value)||0;
let ventas=parseFloat(document.getElementById("ventas").value)||0;
let utilidad=parseFloat(document.getElementById("utilidad").value)||0;

let liquidez=pc?ac/pc:0;
let endeudamiento=at?pt/at:0;
let rentabilidad=ventas?utilidad/ventas:0;

document.getElementById("liquidez").innerText="Liquidez: "+liquidez.toFixed(2);
document.getElementById("endeudamiento").innerText="Endeudamiento: "+(endeudamiento*100).toFixed(1)+"%";
document.getElementById("rentabilidad").innerText="Rentabilidad: "+(rentabilidad*100).toFixed(1)+"%";

return{
liquidez,
endeudamiento,
rentabilidad,
ventas,
utilidad
};

}

async function generarDiagnostico(){

let datos=calcularIndicadores();

let prompt=`
Actúa como consultor financiero.

Liquidez: ${datos.liquidez}
Endeudamiento: ${datos.endeudamiento}
Rentabilidad: ${datos.rentabilidad}
Ventas: ${datos.ventas}
Utilidad: ${datos.utilidad}

Genera un diagnóstico financiero profesional y recomendaciones.
`;

document.getElementById("resultado").innerText="Analizando...";

try{

let res=await fetch("https://finaxis-gemini-proxy.vercel.app/api/gemini",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
prompt:prompt
})
});

let data=await res.json();

if(data.texto){
document.getElementById("resultado").innerText=data.texto;
}else{
document.getElementById("resultado").innerText=JSON.stringify(data,null,2);
}

}catch(err){

document.getElementById("resultado").innerText="Error: "+err;

}

}

function limpiar(){

document.getElementById("resultado").innerText="";

}

</script>

</body>
</html>
