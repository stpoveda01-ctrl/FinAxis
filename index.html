<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinAxis Premium</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>FinAxis - Diagnóstico Financiero</h1>
  
  <div class="panel">
    <h2>Ingresar datos financieros</h2>

    <!-- Balance general -->
    <input id="activos" placeholder="Activos totales">
    <input id="pasivos" placeholder="Pasivos totales">
    <input id="patrimonio" placeholder="Patrimonio">

    <!-- PYG -->
    <input id="ingresos" placeholder="Ingresos">
    <input id="costos" placeholder="Costos">
    <input id="gastos" placeholder="Gastos">

    <button onclick="analizarIA()">Generar diagnóstico con IA</button>
  </div>

  <div id="resultadoIA" class="resultado"></div>

  <footer>
    <p>Creado por: PYC Consultoría Integral SAS | Revisado por: Estiven Poveda | Elaborado por: <span id="autor">Cualquier persona con el link</span></p>
  </footer>
</div>

<script src="script.js"></script>
</body>
</html>
