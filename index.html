<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinAxis SaaS</title>

<!-- Chart.js (para siguiente fase) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  background:#0a0c0f;
  color:#e8ecf4;
  font-family:Arial;
  padding:40px;
}
input{display:block;margin:8px 0;padding:8px;width:200px;}
button{padding:12px 20px;background:#00e5b0;border:none;font-weight:bold;cursor:pointer;}
.results{margin-top:30px;padding:20px;background:#111;border-radius:10px;}
</style>
</head>

<body>

<h1>FinAxis — SaaS Engine</h1>

<!-- INPUTS (mínimos para demo SaaS) -->
<input id="revenue" placeholder="Revenue">
<input id="cogs" placeholder="COGS">
<input id="cash" placeholder="Cash">
<input id="receivables" placeholder="Receivables">
<input id="inventory" placeholder="Inventory">
<input id="payables" placeholder="Payables">
<input id="stdbt" placeholder="Short Debt">
<input id="ltDebt" placeholder="Long Debt">
<input id="paidIn" placeholder="Equity">
<input id="retained" placeholder="Retained Earnings">

<button onclick="runAnalysis()">Analizar</button>

<div class="results" id="results"></div>

<script>

// =============================
// CORE ENGINE (SaaS Ready)
// =============================

function getVal(id){
  return parseFloat(document.getElementById(id).value) || 0;
}

function runAnalysis(){

  // =============================
  // INPUTS
  // =============================
  const data = {
    revenue: getVal('revenue'),
    cogs: getVal('cogs'),
    cash: getVal('cash'),
    receivables: getVal('receivables'),
    inventory: getVal('inventory'),
    payables: getVal('payables'),
    stdbt: getVal('stdbt'),
    ltDebt: getVal('ltDebt'),
    paidIn: getVal('paidIn'),
    retained: getVal('retained')
  };

  // =============================
  // COMPUTE (SEPARADO = SaaS Ready)
  // =============================
  const result = computeFinancials(data);

  // =============================
  // RENDER
  // =============================
  renderResults(result);

}

// =============================
// 🧠 ENGINE PURO (exportable backend)
// =============================
function computeFinancials(d){

  const CA = d.cash + d.receivables + d.inventory;
  const CL = d.payables + d.stdbt;
  const TL = CL + d.ltDebt;
  const EQ = d.paidIn + d.retained;

  const TA = CA + 0; // simplificado SaaS MVP

  const GP = d.revenue - d.cogs;
  const NI = GP;

  const ratios = {
    currentRatio: CL ? CA / CL : 0,
    debtRatio: TA ? TL / TA : 0,
    netMargin: d.revenue ? NI / d.revenue : 0,
    ROE: EQ ? NI / EQ : 0
  };

  // Altman (versión simplificada SaaS)
  const Z = (1.2*((CA-CL)/TA)) + (1.4*(d.retained/TA)) + (3.3*(NI/TA)) + (0.6*(EQ/TL)) + (1*(d.revenue/TA));

  return {
    ...ratios,
    Z,
    score: buildScore(ratios, Z)
  };
}

// =============================
// SCORE ENGINE
// =============================
function buildScore(r, Z){

  let score = 0;

  if(r.currentRatio > 1.5) score += 20;
  if(r.debtRatio < 0.6) score += 20;
  if(r.netMargin > 0.1) score += 20;
  if(r.ROE > 0.15) score += 20;
  if(Z > 2.99) score += 20;

  return score;
}

// =============================
// RENDER (UI desacoplada)
// =============================
function renderResults(r){

  const el = document.getElementById('results');

  el.innerHTML = `
    <h2>Resultados</h2>
    <p>Liquidez: ${r.currentRatio.toFixed(2)}</p>
    <p>Endeudamiento: ${r.debtRatio.toFixed(2)}</p>
    <p>Margen: ${(r.netMargin*100).toFixed(1)}%</p>
    <p>ROE: ${(r.ROE*100).toFixed(1)}%</p>
    <p>Altman Z: ${r.Z.toFixed(2)}</p>
    <hr>
    <h3>Score: ${r.score}/100</h3>
  `;
}

</script>

</body>
</html>
